<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הסל החכם</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

    <style>
        :root { --primary: #075e54; --bg: #e5ddd5; }
        body { 
            font-family: -apple-system, sans-serif; background-color: var(--bg);
            background-image: url('https://www.transparenttextures.com/patterns/food.png');
            margin: 0; padding: 10px; padding-bottom: 100px;
        }
        .logo-row { text-align: center; padding: 5px; }
        .logo-row img { height: 30px; }
        .family-tag { display: block; text-align: center; background: rgba(255,255,255,0.9); padding: 5px; border-radius: 20px; font-weight: bold; font-size: 13px; margin-bottom: 10px; border: 1px solid #ccc; }
        
        .input-card { background: white; border-radius: 15px; padding: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: sticky; top: 10px; z-index: 100; margin-bottom: 15px; }
        .input-row { display: flex; gap: 5px; }
        input[type="text"] { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; }
        .btn { background: #f8fafc; border: 1px solid #ddd; border-radius: 10px; padding: 8px; font-size: 18px; cursor: pointer; }
        .add-btn { background: var(--primary); color: white; border: none; width: 100%; padding: 10px; border-radius: 10px; font-weight: bold; margin-top: 8px; }

        #interactive.viewport { width: 100%; height: 160px; display: none; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 10px; }
        
        .cat-header { font-size: 13px; font-weight: bold; color: #555; margin: 15px 5px 5px; display: flex; align-items: center; }
        .items-box { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .list-item { padding: 12px 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #f0f0f0; align-items: center; transition: 0.3s; }
        .list-item.checked { background: #f9f9f9; opacity: 0.6; }
        .list-item.checked b { text-decoration: line-through; }
        
        .item-info { display: flex; align-items: center; gap: 10px; flex: 1; }
        .price-tag { font-size: 11px; color: #25d366; background: #e8f5e9; padding: 2px 5px; border-radius: 4px; }
        
        .footer-total { position: fixed; bottom: 0; left: 0; right: 0; background: var(--primary); color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; z-index: 1000; }
        .recording { background: #ff4b2b !important; animation: pulse 1s infinite; color: white !important; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="logo-row"><img src="https://cdn-icons-png.flaticon.com/512/3724/3724720.png"></div>
    <div id="tagDisplay" class="family-tag">משפחת: ...</div>

    <div class="input-card">
        <div id="interactive" class="viewport"></div>
        <div class="input-row">
            <input type="text" id="itemIn" placeholder="הקלידו מוצר...">
            <button class="btn" id="voiceBtn" onclick="startVoice()">🎙️</button>
            <button class="btn" onclick="toggleScanner()">📷</button>
        </div>
        <button class="add-btn" onclick="processAndAdd()">הוסף לרשימה</button>
    </div>

    <div id="mainList"></div>
    <div id="footerTotal" class="footer-total">סה"כ משוער: 0.00 ₪</div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyB0ofm8cUnZ1pAQS3ZKvenV83bSa_FvH_A",
          authDomain: "mytasksapp-68e71.firebaseapp.com",
          projectId: "mytasksapp-68e71",
          storageBucket: "mytasksapp-68e71.firebasestorage.app",
          messagingSenderId: "673661240265",
          appId: "1:673661240265:web:2eb7aad37f608be6be1e18"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let familyID = localStorage.getItem('shopping_familyID') || prompt("קוד משפחתי:");
        localStorage.setItem('shopping_familyID', familyID);
        document.getElementById('tagDisplay').innerText = "משפחת: " + familyID;

        const dictionary = {
            "🥛 חלב וביצים": ["חלב", "גבינה", "ביצים", "קוטג", "חמאה", "יוגורט", "שמנת"],
            "🥦 ירקות ופירות": ["עגבני", "מלפפון", "בצל", "תפוח", "בננה", "גזר", "חס", "פלפל"],
            "🥩 בשר ודגים": ["עוף", "בשר", "דג", "שניצל", "נקניק"],
            "🧼 ניקיון ופארם": ["נייר", "שמפו", "סבון", "כביסה", "חיתול", "משחה"],
            "🍭 חטיפים ומתוקים": ["במבה", "ביסלי", "שוקולד", "חטיף", "עוגיות"]
        };

        const priceMap = { "חלב": 6.8, "לחם": 9, "ביצים": 14, "קוטג": 6, "גבינה": 7, "עגבני": 6, "מלפפון": 5, "במבה": 4, "עוף": 35 };

        function getCategory(text) {
            for (let cat in dictionary) { if (dictionary[cat].some(k => text.includes(k))) return cat; }
            return "📦 כללי";
        }

        function getPrice(text) {
            for (let k in priceMap) { if (text.includes(k)) return priceMap[k]; }
            return 0;
        }

        function processAndAdd(val = null) {
            const input = document.getElementById('itemIn');
            const text = val || input.value.trim();
            if (!text) return;
            db.collection("families").doc(familyID).collection("smartList").add({
                name: text,
                category: getCategory(text),
                price: getPrice(text),
                checked: false,
                timestamp: Date.now()
            });
            input.value = "";
        }

        // תיקון רמקול
        function startVoice() {
            const btn = document.getElementById('voiceBtn');
            const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Recognition) return alert("הדפדפן לא תומך בדיבור");
            
            const rec = new Recognition();
            rec.lang = 'he-IL';
            rec.onstart = () => btn.classList.add('recording');
            rec.onresult = (e) => {
                const text = e.results[0][0].transcript;
                processAndAdd(text);
            };
            rec.onend = () => btn.classList.remove('recording');
            rec.onerror = () => btn.classList.remove('recording');
            rec.start();
        }

        function toggleScanner() {
            const vp = document.getElementById('interactive');
            if (vp.style.display === 'block') { Quagga.stop(); vp.style.display = 'none'; }
            else { 
                vp.style.display = 'block'; 
                Quagga.init({ inputStream: { name: "Live", type: "LiveStream", target: vp, constraints: { facingMode: "environment" } }, decoder: { readers: ["ean_reader"] } }, (err) => { if (!err) Quagga.start(); });
            }
        }

        Quagga.onDetected(async (d) => {
            Quagga.stop(); document.getElementById('interactive').style.display = 'none';
            const code = d.codeResult.code;
            try {
                const r = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
                const j = await r.json();
                processAndAdd(j.product?.product_name_he || j.product?.product_name || "ברקוד " + code);
            } catch(e) { processAndAdd("ברקוד " + code); }
        });

        db.collection("families").doc(familyID).collection("smartList").onSnapshot(snap => {
            const items = []; snap.forEach(doc => items.push({id: doc.id, ...doc.data()}));
            render(items);
        });

        function render(items) {
            const listDiv = document.getElementById('mainList');
            listDiv.innerHTML = '';
            let total = 0;
            
            // מיון לפי קטגוריות
            const groups = items.reduce((acc, i) => { (acc[i.category] = acc[i.category] || []).push(i); return acc; }, {});

            for (let cat in groups) {
                const catSec = document.createElement('div');
                catSec.innerHTML = `<div class="cat-header">${cat}</div>`;
                const box = document.createElement('div');
                box.className = 'items-box';
                
                // מיון פנימי: לא מסומנים קודם
                const sortedItems = groups[cat].sort((a,b) => a.checked - b.checked);
                
                sortedItems.forEach(item => {
                    if (!item.checked) total += (item.price || 0);
                    const div = document.createElement('div');
                    div.className = `list-item ${item.checked ? 'checked' : ''}`;
                    div.innerHTML = `
                        <div class="item-info" onclick="toggleCheck('${item.id}', ${item.checked})">
                            <input type="checkbox" ${item.checked ? 'checked' : ''}>
                            <b>${item.name}</b>
                            ${item.price > 0 ? `<span class="price-tag">${item.price} ₪</span>` : ''}
                        </div>
                        <button style="border:none; background:none; color:#ddd; font-size:18px;" onclick="deleteItem('${item.id}')">✕</button>
                    `;
                    box.appendChild(div);
                });
                catSec.appendChild(box);
                listDiv.appendChild(catSec);
            }
            document.getElementById('footerTotal').innerText = `סה"כ משוער (לא כולל מסומנים): ${total.toFixed(2)} ₪`;
        }

        function toggleCheck(id, status) { db.collection("families").doc(familyID).collection("smartList").doc(id).update({ checked: !status }); }
        function deleteItem(id) { db.collection("families").doc(familyID).collection("smartList").doc(id).delete(); }
    </script>
</body>
</html>
