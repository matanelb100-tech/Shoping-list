<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#7BC4E2" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="RunPrice" />
  <meta name="description" content="רשימת קניות חכמה — השוואת מחירים בזמן אמת בין 5 רשתות שיווק" />

  <title>RunPrice — רשימת קניות חכמה</title>

  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- ============================================================
       CSS Variables + Splash + Screens + Auth + Placeholder — inline
       ============================================================ -->
  <style>
    :root {
      --color-primary:             #7BC4E2;
      --color-primary-dark:        #5BA8C9;
      --color-primary-light:       #B8DFED;
      --color-primary-ultra-light: #E8F4FA;
      --color-accent:              #F2A649;
      --color-bg:                  #FAF7F2;
      --color-bg-alt:              #F0EDE7;
      --color-surface:             #FFFFFF;
      --color-text:                #2C3E50;
      --color-text-soft:           #546879;
      --color-text-muted:          #8FA0AE;
      --color-border:              #E5DFD5;
      --color-success:             #7DB87D;
      --color-danger:              #E57373;
      --color-warning:             #F5C97A;

      --radius-sm:   8px;
      --radius-md:   12px;
      --radius-lg:   16px;
      --radius-xl:   24px;
      --radius-full: 9999px;

      --shadow-sm: 0 2px 6px rgba(44, 62, 80, 0.06);
      --shadow-md: 0 4px 12px rgba(44, 62, 80, 0.08);
      --shadow-lg: 0 10px 30px -8px rgba(44, 62, 80, 0.18);

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--color-bg);
      font-family: 'Rubik', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--color-text);
      overflow: hidden;
    }

    /* --- Screens system --- */
    #app-root {
      position: relative;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }
    .screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      overflow-y: auto;
      background: var(--color-bg);
    }
    .screen.active {
      display: flex;
      animation: fadeIn 0.25s var(--ease-out);
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* --- Splash --- */
    #splash-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--color-primary-ultra-light) 0%, var(--color-bg) 100%);
      transition: opacity 0.4s, visibility 0.4s;
      gap: 16px;
    }
    #splash-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .splash-logo {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      box-shadow: var(--shadow-lg);
    }
    .splash-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--color-text);
    }
    .splash-subtitle {
      font-size: 15px;
      color: var(--color-text-soft);
    }
    .splash-spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--color-border);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 8px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* --- Offline banner --- */
    #offline-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9000;
      padding: 8px 16px;
      background: var(--color-warning);
      color: var(--color-text);
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      transform: translateY(-100%);
      transition: transform 0.3s var(--ease-out);
    }
    #offline-banner.visible {
      transform: translateY(0);
    }

    /* --- Main placeholder (זמני) --- */
    .main-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .main-placeholder-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
    .main-placeholder h1 {
      margin: 0 0 8px;
      font-size: 32px;
      color: var(--color-text);
    }
    .main-placeholder-welcome {
      margin: 0 0 24px;
      color: var(--color-text-soft);
      font-size: 15px;
      direction: ltr;
    }
    .main-placeholder-card {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-md);
      max-width: 360px;
      width: 100%;
      text-align: right;
    }
    .main-placeholder-card h2 {
      margin: 0 0 12px;
      color: var(--color-success);
      font-size: 18px;
    }
    .main-placeholder-card p {
      margin: 0 0 12px;
      color: var(--color-text-soft);
      font-size: 14px;
    }
    .main-placeholder-card ul {
      margin: 0;
      padding-right: 20px;
      color: var(--color-text);
      font-size: 14px;
      line-height: 1.9;
    }
    .main-placeholder-logout {
      margin-top: 24px;
      padding: 12px 32px;
      background: transparent;
      border: 1.5px solid var(--color-danger);
      color: var(--color-danger);
      border-radius: var(--radius-full);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .main-placeholder-logout:hover:not(:disabled) {
      background: var(--color-danger);
      color: white;
    }
    .main-placeholder-logout:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* --- Auth screen --- */
    .auth-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px 48px;
      max-width: 420px;
      margin: 0 auto;
      width: 100%;
    }
    .auth-logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      box-shadow: var(--shadow-lg);
      margin-bottom: 20px;
    }
    .auth-title {
      margin: 0 0 4px;
      font-size: 28px;
      font-weight: 700;
      color: var(--color-text);
    }
    .auth-subtitle {
      margin: 0 0 8px;
      font-size: 16px;
      font-weight: 500;
      color: var(--color-primary-dark);
    }
    .auth-hint {
      margin: 0 0 28px;
      font-size: 13px;
      color: var(--color-text-muted);
      text-align: center;
      line-height: 1.5;
      max-width: 320px;
    }
    .auth-error {
      width: 100%;
      max-width: 360px;
      padding: 12px 16px;
      background: rgba(229, 115, 115, 0.1);
      border: 1px solid var(--color-danger);
      border-radius: var(--radius-md);
      color: var(--color-danger);
      font-size: 14px;
      margin-bottom: 16px;
      text-align: right;
    }
    .auth-error.is-success {
      background: rgba(125, 184, 125, 0.1);
      border-color: var(--color-success);
      color: var(--color-success);
    }
    .auth-error.hidden {
      display: none;
    }
    .auth-form {
      width: 100%;
      max-width: 360px;
    }
    .auth-field {
      margin-bottom: 16px;
    }
    .auth-label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-soft);
    }
    .auth-input {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      font-family: inherit;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-surface);
      color: var(--color-text);
      transition: border-color 0.2s;
    }
    .auth-input:focus {
      outline: none;
      border-color: var(--color-primary);
    }
    .auth-password-wrapper {
      position: relative;
    }
    .auth-eye {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      padding: 6px;
      cursor: pointer;
      color: var(--color-text-muted);
    }
    .auth-eye svg {
      width: 22px;
      height: 22px;
    }
    .auth-eye:hover {
      color: var(--color-primary-dark);
    }
    .auth-submit {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      color: white;
      background: var(--color-primary);
      border: none;
      border-radius: var(--radius-full);
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(123, 196, 226, 0.4);
      transition: background 0.2s, transform 0.1s;
    }
    .auth-submit:hover:not(:disabled) {
      background: var(--color-primary-dark);
    }
    .auth-submit:active:not(:disabled) {
      transform: scale(0.98);
    }
    .auth-submit:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .auth-links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 24px;
    }
    .auth-link {
      background: transparent;
      border: none;
      color: var(--color-primary-dark);
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      padding: 4px;
    }
    .auth-link:hover {
      text-decoration: underline;
    }
    .auth-link-muted {
      color: var(--color-text-muted);
      font-size: 13px;
    }
    .auth-tip {
      margin-top: 32px;
      padding: 12px 16px;
      background: var(--color-primary-ultra-light);
      border-radius: var(--radius-md);
      color: var(--color-text-soft);
      font-size: 13px;
      text-align: center;
      max-width: 340px;
    }

    /* --- Boot error (debug fallback) --- */
    #boot-error {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10000;
      padding: 24px;
      background: var(--color-bg);
      color: var(--color-text);
      direction: rtl;
      overflow: auto;
    }
    #boot-error.show { display: block; }
    #boot-error h1 { color: var(--color-danger); margin: 0 0 12px; font-size: 18px; }
    #boot-error pre {
      background: white;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      white-space: pre-wrap;
      direction: ltr;
      text-align: left;
    }
  </style>
</head>

<body>

  <!-- Splash -->
  <div id="splash-screen">
    <div class="splash-logo">🛒</div>
    <div class="splash-title">RunPrice</div>
    <div class="splash-subtitle">רשימת קניות חכמה</div>
    <div class="splash-spinner"></div>
  </div>

  <!-- Boot error (debug — מוצג רק אם משהו קורס) -->
  <div id="boot-error">
    <h1>⚠️ שגיאה בטעינה</h1>
    <pre id="boot-error-msg"></pre>
  </div>

  <!-- Offline banner -->
  <div id="offline-banner">
    אין חיבור לאינטרנט
  </div>

  <!-- Screens -->
  <div id="app-root">
    <section id="screen-auth" class="screen" aria-label="כניסה"></section>
    <section id="screen-main" class="screen" aria-label="רשימת קניות"></section>
  </div>

  <!-- Boot error capture (לפני שום קוד אחר) -->
  <script>
    window.__bootErrors = [];
    function showBootError(msg) {
      window.__bootErrors.push(msg);
      var el = document.getElementById('boot-error-msg');
      var box = document.getElementById('boot-error');
      if (el && box) {
        el.textContent = window.__bootErrors.join('\n\n');
        box.classList.add('show');
      }
    }
    window.addEventListener('error', function (e) {
      if (e.filename && e.filename.indexOf('.js') !== -1) {
        showBootError('Script error: ' + e.message + '\nFile: ' + e.filename + ':' + e.lineno);
      }
    });
    window.addEventListener('unhandledrejection', function (e) {
      showBootError('Promise rejection: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
    });
  </script>

  <!-- App entry point — ES module -->
  <script type="module" src="js/app.js?v=5"></script>

  <!-- Hide splash on app:ready (with 5s safety net) -->
  <script>
    window.addEventListener('app:ready', function () {
      var splash = document.getElementById('splash-screen');
      if (splash) splash.classList.add('hidden');
    });
    setTimeout(function () {
      var splash = document.getElementById('splash-screen');
      if (splash && !splash.classList.contains('hidden')) {
        console.warn('[boot] app:ready did not fire — hiding splash');
        splash.classList.add('hidden');
      }
    }, 5000);
  </script>

</body>
</html>
