<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הסל החכם - משפחת {{familyID}}</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

    <style>
        :root { --primary: #075e54; --secondary: #25d366; --bg: #e5ddd5; }
        body { 
            font-family: -apple-system, sans-serif; background-color: var(--bg);
            background-image: url('https://www.transparenttextures.com/patterns/food.png');
            margin: 0; padding: 10px; min-height: 100vh; padding-bottom: 80px;
        }
        .logo-row { text-align: center; padding: 10px 0; }
        .logo-row img { height: 35px; }
        .family-tag { display: block; text-align: center; background: white; padding: 5px; border-radius: 20px; font-weight: bold; font-size: 14px; margin-bottom: 10px; border: 1px solid #ccc; }
        
        .input-card { background: white; border-radius: 15px; padding: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: sticky; top: 10px; z-index: 100; margin-bottom: 15px; }
        .input-row { display: flex; gap: 5px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; }
        .btn { background: #f0f0f0; border: 1px solid #ddd; border-radius: 10px; padding: 10px; font-size: 20px; cursor: pointer; }
        .add-btn { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; margin-top: 8px; font-size: 16px; }

        #interactive.viewport { width: 100%; height: 180px; display: none; margin-bottom: 10px; border-radius: 12px; overflow: hidden; background: #000; }
        
        .category-header { font-size: 14px; font-weight: bold; color: #555; margin: 15px 5px 5px; }
        .items-container { background: white; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .list-item { padding: 12px 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #f0f0f0; align-items: center; }
        .list-item:last-child { border-bottom: none; }
        .item-price { font-size: 12px; color: #888; margin-right: 5px; }
        
        .footer-summary { position: fixed; bottom: 0; left: 0; right: 0; background: var(--primary); color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; box-shadow: 0 -4px 10px rgba(0,0,0,0.2); z-index: 1000; }
        .recording { background: #ff4b2b !important; color: white !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="logo-row"><img src="https://cdn-icons-png.flaticon.com/512/3724/3724720.png"></div>
    <div id="tagDisplay" class="family-tag">טוען...</div>

    <div class="input-card">
        <div id="interactive" class="viewport"></div>
        <div class="input-row">
            <input type="text" id="itemIn" placeholder="מה לקנות?">
            <button class="btn" id="voiceBtn" onclick="startVoice()">🎙️</button>
            <button class="btn" onclick="toggleScanner()">📷</button>
        </div>
        <button class="add-btn" onclick="processAndAdd()">הוסף לסל</button>
    </div>

    <div id="mainList"></div>
    <div id="footerTotal" class="footer-summary">סה"כ משוער: 0.00 ₪</div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyB0ofm8cUnZ1pAQS3ZKvenV83bSa_FvH_A",
          authDomain: "mytasksapp-68e71.firebaseapp.com",
          projectId: "mytasksapp-68e71",
          storageBucket: "mytasksapp-68e71.firebasestorage.app",
          messagingSenderId: "673661240265",
          appId: "1:673661240265:web:2eb7aad37f608be6be1e18"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let familyID = localStorage.getItem('shopping_familyID') || prompt("קוד משפחתי:");
        localStorage.setItem('shopping_familyID', familyID);
        document.getElementById('tagDisplay').innerText = "משפחת: " + familyID;

        // מחירון בסיסי למתן הערכה
        const priceMap = {
            "חלב": 6.8, "לחם": 9, "ביצים": 14, "קוטג": 6, "גבינה": 7,
            "עגבני": 6, "מלפפון": 5, "בצל": 4, "תפוח": 9, "בננה": 8,
            "עוף": 35, "בשר": 60, "דג": 45, "במבה": 4, "ביסלי": 4, "שוקולד": 6
        };

        function getEstimate(name) {
            for (let k in priceMap) { if (name.includes(k)) return priceMap[k]; }
            return 0;
        }

        function processAndAdd(val = null) {
            const input = document.getElementById('itemIn');
            const text = val || input.value.trim();
            if (!text) return;
            db.collection("families").doc(familyID).collection("smartList").add({
                name: text,
                price: getEstimate(text),
                timestamp: Date.now()
            });
            input.value = "";
        }

        function startVoice() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'he-IL';
            rec.onstart = () => document.getElementById('voiceBtn').classList.add('recording');
            rec.onresult = (e) => { processAndAdd(e.results[0][0].transcript); };
            rec.onend = () => document.getElementById('voiceBtn').classList.remove('recording');
            rec.start();
        }

        function toggleScanner() {
            const vp = document.getElementById('interactive');
            if (vp.style.display === 'block') { Quagga.stop(); vp.style.display = 'none'; }
            else { vp.style.display = 'block'; Quagga.init({ inputStream: { name: "Live", type: "LiveStream", target: vp, constraints: { facingMode: "environment" } }, decoder: { readers: ["ean_reader"] } }, (err) => { if (!err) Quagga.start(); }); }
        }

        Quagga.onDetected(async (d) => {
            Quagga.stop(); document.getElementById('interactive').style.display = 'none';
            try {
                const r = await fetch(`https://world.openfoodfacts.org/api/v0/product/${d.codeResult.code}.json`);
                const j = await r.json();
                processAndAdd(j.product?.product_name_he || j.product?.product_name || "ברקוד " + d.codeResult.code);
            } catch(e) { processAndAdd("ברקוד " + d.codeResult.code); }
        });

        db.collection("families").doc(familyID).collection("smartList").orderBy("timestamp", "desc").onSnapshot(snap => {
            const items = []; snap.forEach(d => items.push({id: d.id, ...d.data()}));
            render(items);
        });

        function render(items) {
            const list = document.getElementById('mainList');
            list.innerHTML = '';
            let total = 0;
            items.forEach(i => {
                total += (i.price || 0);
                list.innerHTML += `<div class="list-item">
                    <div><b>${i.name}</b> <span class="item-price">${i.price > 0 ? i.price + ' ₪' : ''}</span></div>
                    <button style="border:none; background:none; font-size:20px; color:#ccc;" onclick="deleteItem('${i.id}')">✕</button>
                </div>`;
            });
            document.getElementById('footerTotal').innerText = `סה"כ משוער: ${total.toFixed(2)} ₪`;
        }
        function deleteItem(id) { db.collection("families").doc(familyID).collection("smartList").doc(id).delete(); }
    </script>
</body>
</html>
