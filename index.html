<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הסל החכם Pro - Unified</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

    <style>
        :root { --primary: #075e54; --light-green: #dcf8c6; --bg-wa: #e5ddd5; }
        
        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--bg-wa) url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            margin: 0; padding-bottom: 160px;
        }

        /* עיצוב לוח השוואה בתחתית */
        .comparison-footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; border-top: 3px solid var(--primary);
            border-radius: 20px 20px 0 0; padding: 15px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 2000;
        }
        .comparison-grid { display: flex; justify-content: space-around; text-align: center; }
        .store-box { flex: 1; border-left: 1px solid #eee; }
        .store-box:last-child { border: none; }
        .store-name { font-size: 12px; color: #666; font-weight: bold; }
        .store-price { display: block; font-size: 18px; color: var(--primary); font-weight: 900; }
        .best-price { color: #059669; }

        /* קטגוריות ורשימה */
        .category-label { 
            background: var(--primary); color: white; padding: 4px 12px; 
            border-radius: 20px; font-size: 13px; margin: 15px 10px 5px; display: inline-block;
        }
        .item-card { 
            background: white; margin: 5px 10px; padding: 12px; border-radius: 12px;
            display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .item-card.checked { opacity: 0.5; background: #f0f0f0; }
        .product-img { width: 45px; height: 45px; object-fit: contain; margin-left: 10px; border-radius: 5px; background: #f9f9f9; }
        .info { flex: 1; }
        .info b { display: block; font-size: 15px; }
        .info small { color: #888; font-size: 11px; }

        /* קלט */
        .input-area { background: white; padding: 15px; margin: 10px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: sticky; top: 10px; z-index: 1000; }
        .input-row { display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; }
        .btn-round { background: #f0f0f0; border: none; width: 45px; border-radius: 10px; cursor: pointer; font-size: 20px; }

        #interactive.viewport { width: 100%; height: 200px; display: none; border-radius: 15px; margin-bottom: 10px; border: 2px solid var(--primary); }
    </style>
</head>
<body>

    <div id="appContent">
        <div class="input-area">
            <div id="interactive" class="viewport"></div>
            <div class="input-row">
                <input type="text" id="itemIn" placeholder="הקלידו מוצר או סרקו...">
                <button class="btn-round" onclick="startVoice()">🎙️</button>
                <button class="btn-round" onclick="toggleScanner()">📷</button>
            </div>
            <button onclick="handleAddition()" style="width:100%; background:var(--primary); color:white; border:none; padding:12px; border-radius:10px; margin-top:10px; font-weight:bold;">הוסף לסל</button>
        </div>

        <div id="listDisplay"></div>

        <div class="comparison-footer">
            <div style="text-align:center; margin-bottom:10px; font-size:12px; color:#666;">סיכום סל משוער ברשתות:</div>
            <div class="comparison-grid">
                <div class="store-box">
                    <span class="store-name">רמי לוי</span>
                    <b class="store-price" id="res-rl">0 ₪</b>
                </div>
                <div class="store-box">
                    <span class="store-name">שופרסל</span>
                    <b class="store-price" id="res-sh">0 ₪</b>
                </div>
                <div class="store-box">
                    <span class="store-name">יוחננוף</span>
                    <b class="store-price" id="res-yo">0 ₪</b>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- אתחול Firebase ---
        const firebaseConfig = { apiKey: "AIzaSyB0ofm8cUnZ1pAQS3ZKvenV83bSa_FvH_A", authDomain: "mytasksapp-68e71.firebaseapp.com", projectId: "mytasksapp-68e71", storageBucket: "mytasksapp-68e71.firebasestorage.app", messagingSenderId: "673661240265", appId: "1:673661240265:web:2eb7aad37f608be6be1e18" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const familyID = localStorage.getItem('gID') || "משפחה_כללית";

        // --- מנוע הוספה חכם (כאן נחבר את Pricez) ---
        async function handleAddition(val = null) {
            const text = val || document.getElementById('itemIn').value.trim();
            if (!text) return;

            // 1. חיפוש נתונים ויזואליים ב-OpenFoodFacts (בינתיים)
            const res = await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${text}&json=1`);
            const data = await res.json();
            const product = data.products ? data.products[0] : null;

            // 2. בניית אובייקט המוצר
            const newItem = {
                n: product ? (product.product_name_he || product.product_name) : text,
                img: product ? product.image_small_url : 'https://cdn-icons-png.flaticon.com/512/1170/1170678.png',
                code: product ? product.code : '',
                p: 0, // יתמלא מהלומדה או מה-API בהמשך
                c: false,
                cat: "כללי", // פונקציית קטגוריות תשולב כאן
                t: Date.now()
            };

            // 3. בדיקה ב"לומדה" האישית
            if (newItem.code) {
                const pDoc = await db.collection("f").doc(familyID).collection("p").doc(newItem.code).get();
                if (pDoc.exists) newItem.p = pDoc.data().v;
            }

            await db.collection("f").doc(familyID).collection("l").add(newItem);
            document.getElementById('itemIn').value = "";
        }

        // --- תצוגה ומיון ---
        function loadData() {
            db.collection("f").doc(familyID).collection("l").orderBy("t", "desc").onSnapshot(snap => {
                const list = document.getElementById('listDisplay');
                list.innerHTML = '';
                let total = 0;
                let items = [];
                snap.forEach(d => items.push({id: d.id, ...d.data()}));

                // מיון: קודם לא מסומנים, ואז לפי זמן
                items.sort((a,b) => a.c - b.c);

                items.forEach(i => {
                    if (!i.c) total += (i.p || 0);
                    list.innerHTML += `
                        <div class="item-card ${i.c ? 'checked' : ''}">
                            <img src="${i.img}" class="product-img">
                            <div class="info" onclick="toggle('${i.id}', ${i.c})">
                                <b>${i.n}</b>
                                <small>${i.code ? 'מק"ט: '+i.code : 'חיפוש חופשי'}</small>
                            </div>
                            <div style="text-align:left">
                                <span style="display:block; font-weight:bold; color:var(--primary)" onclick="updatePrice('${i.id}','${i.n}','${i.code}',${i.p})">
                                    ${i.p > 0 ? i.p + ' ₪' : 'מחיר?'}
                                </span>
                                <button onclick="del('${i.id}')" style="border:none; background:none; color:#ccc;">✕</button>
                            </div>
                        </div>`;
                });
                calculateStoreComparison(total);
            });
        }

        // --- חישוב השוואת רשתות (סימולטור מקצועי) ---
        function calculateStoreComparison(baseTotal) {
            const rl = baseTotal * 0.94; // רמי לוי בדר"כ זול ב-6% מהממוצע
            const sh = baseTotal * 1.05; // שופרסל יקר ב-5% מהממוצע
            const yo = baseTotal * 1.01;

            document.getElementById('res-rl').innerText = rl.toFixed(2) + " ₪";
            document.getElementById('res-sh').innerText = sh.toFixed(2) + " ₪";
            document.getElementById('res-yo').innerText = yo.toFixed(2) + " ₪";
        }

        // --- פונקציות עזר (סורק, קול, מחיקה) ---
        function toggleScanner() {
            const vp = document.getElementById('interactive');
            if (vp.style.display === 'block') { Quagga.stop(); vp.style.display = 'none'; }
            else { 
                vp.style.display = 'block'; 
                Quagga.init({ inputStream: { name: "Live", type: "LiveStream", target: vp }, decoder: { readers: ["ean_reader"] } }, (err) => { if(!err) Quagga.start(); });
            }
        }
        Quagga.onDetected(d => { Quagga.stop(); document.getElementById('interactive').style.display='none'; handleAddition(d.codeResult.code); });

        function startVoice() {
            const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
            const r = new Rec(); r.lang = 'he-IL';
            r.onresult = (e) => handleAddition(e.results[0][0].transcript);
            r.start();
        }

        async function updatePrice(id, name, code, old) {
            const p = prompt(`עדכן מחיר ל${name}:`, old);
            if (p !== null) {
                const v = parseFloat(p) || 0;
                await db.collection("f").doc(familyID).collection("l").doc(id).update({ p: v });
                if (code) await db.collection("f").doc(familyID).collection("p").doc(code).set({ v: v });
            }
        }

        function toggle(id, s) { db.collection("f").doc(familyID).collection("l").doc(id).update({c: !s}); }
        function del(id) { db.collection("f").doc(familyID).collection("l").doc(id).delete(); }

        loadData();
    </script>
</body>
</html>
